/* ============================================
   PRICE CALCULATOR CONTAINER
   ============================================ */
.price-calculator {
    background: var(--bg-primary);
    border-radius: 20px;
    padding: 40px;
    box-shadow: var(--shadow-secondary);
    margin: 40px 0;
}

.calculator-header {
    text-align: center;
    margin-bottom: 40px;
}

.calculator-header h2 {
    font-size: 32px;
    font-weight: 700;
    color: var(--text-primary);
    margin-bottom: 10px;
}

.calculator-header p {
    font-size: 16px;
    color: var(--text-secondary);
}

/* ============================================
   CALCULATOR FORM
   ============================================ */
.calculator-form {
    display: grid;
    gap: 20px;
    margin-bottom: 30px;
}

.form-group {
    position: relative;
}

.form-group label {
    display: block;
    font-weight: 600;
    color: var(--text-primary);
    margin-bottom: 8px;
    font-size: 14px;
}

.form-group label i {
    margin-right: 8px;
    color: var(--primary-color);
}

.location-input-wrapper {
    position: relative;
}

.location-input {
    width: 100%;
    padding: 15px 50px 15px 20px;
    border: 2px solid var(--border-color);
    border-radius: 12px;
    font-size: 16px;
    color: var(--text-primary);
    background: var(--bg-primary);
    transition: all 0.3s ease;
}

.location-input:focus {
    outline: none;
    border-color: var(--primary-color);
    box-shadow: 0 0 0 4px rgba(0, 123, 255, 0.1);
}

.location-input::placeholder {
    color: var(--text-secondary);
}

.input-icon {
    position: absolute;
    right: 20px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-secondary);
    pointer-events: none;
}

/* Swap Button */
.swap-locations {
    display: flex;
    justify-content: center;
    margin: -10px 0;
}

#swap-locations {
    width: 50px;
    height: 50px;
    border-radius: 50%;
    border: 2px solid var(--border-color);
    background: var(--bg-primary);
    color: var(--primary-color);
    cursor: pointer;
    transition: all 0.3s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
}

#swap-locations:hover {
    background: var(--primary-color);
    color: var(--text-light);
    transform: rotate(180deg);
    border-color: var(--primary-color);
}

/* Calculate Button */
#calculate-price {
    width: 100%;
    padding: 18px;
    background: var(--gradient-primary);
    color: var(--text-light);
    border: none;
    border-radius: 12px;
    font-size: 18px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
}

#calculate-price:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 20px rgba(0, 123, 255, 0.3);
}

#calculate-price:active {
    transform: translateY(0);
}

#calculate-price:disabled {
    opacity: 0.6;
    cursor: not-allowed;
}

/* ============================================
   MAP CONTAINER
   ============================================ */
#map {
    width: 100%;
    height: 400px;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: var(--shadow-secondary);
    margin-bottom: 30px;
}

/* ============================================
   PRICE RESULTS
   ============================================ */
#price-results {
    display: none;
    margin-top: 30px;
}

.price-result-card {
    background: var(--bg-secondary);
    border-radius: 16px;
    padding: 30px;
    box-shadow: var(--shadow-secondary);
}

/* Route Info */
.route-info {
    margin-bottom: 25px;
}

.route-item {
    display: flex;
    gap: 15px;
    padding: 15px;
    background: var(--bg-primary);
    border-radius: 12px;
    margin-bottom: 10px;
}

.route-item i {
    font-size: 24px;
    margin-top: 5px;
}

.route-item strong {
    display: block;
    color: var(--text-primary);
    margin-bottom: 5px;
}

.route-item p {
    color: var(--text-secondary);
    margin: 0;
    font-size: 14px;
}

.route-divider {
    text-align: center;
    padding: 10px 0;
    color: var(--text-secondary);
}

/* Distance Info */
.distance-info {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 15px;
    margin-bottom: 25px;
}

.info-item {
    display: flex;
    align-items: center;
    gap: 15px;
    padding: 20px;
    background: var(--bg-primary);
    border-radius: 12px;
    border-left: 4px solid var(--primary-color);
}

.info-item i {
    font-size: 32px;
    color: var(--primary-color);
}

.info-item .label {
    display: block;
    font-size: 12px;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.5px;
}

.info-item .value {
    display: block;
    font-size: 24px;
    font-weight: 700;
    color: var(--text-primary);
}

/* Price Breakdown */
.price-breakdown {
    background: var(--bg-primary);
    border-radius: 12px;
    padding: 25px;
    margin-bottom: 25px;
}

.price-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 0;
    border-bottom: 1px solid var(--border-color);
    font-size: 15px;
}

.price-item:last-child {
    border-bottom: none;
}

.price-item span:first-child {
    color: var(--text-secondary);
}

.price-item span:last-child {
    font-weight: 600;
    color: var(--text-primary);
}

.price-item.discount span:last-child {
    color: #28a745;
}

.price-item.total {
    padding-top: 20px;
    margin-top: 10px;
    border-top: 2px solid var(--border-color);
    font-size: 18px;
}

.price-item.total span {
    font-weight: 700;
}

.final-price {
    font-size: 32px !important;
    color: var(--primary-color) !important;
}

/* Price Actions */
.price-actions {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 15px;
    margin-bottom: 20px;
}

.price-actions .btn {
    padding: 15px 25px;
    font-size: 16px;
    font-weight: 600;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    text-decoration: none;
    transition: all 0.3s ease;
}

.price-actions .btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(0, 0, 0, 0.15);
}

/* Price Note */
.price-note {
    display: flex;
    gap: 12px;
    padding: 15px;
    background: rgba(255, 193, 7, 0.1);
    border-left: 4px solid #FFC107;
    border-radius: 8px;
}

.price-note i {
    color: #FFC107;
    font-size: 20px;
    margin-top: 2px;
}

.price-note p {
    margin: 0;
    font-size: 14px;
    color: var(--text-secondary);
}

/* ============================================
   POPULAR ROUTES
   ============================================ */
.popular-routes {
    margin-top: 40px;
}

.popular-routes h3 {
    font-size: 24px;
    font-weight: 700;
    color: var(--text-primary);
    margin-bottom: 20px;
    text-align: center;
}

.popular-routes-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 20px;
}

.popular-route-card {
    background: var(--bg-primary);
    border: 2px solid var(--border-color);
    border-radius: 12px;
    padding: 20px;
    transition: all 0.3s ease;
    cursor: pointer;
}

.popular-route-card:hover {
    border-color: var(--primary-color);
    transform: translateY(-5px);
    box-shadow: var(--shadow-primary);
}

.route-name {
    font-size: 16px;
    font-weight: 600;
    color: var(--text-primary);
    margin-bottom: 12px;
}

.route-details {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 15px;
    font-size: 14px;
    color: var(--text-secondary);
}

.route-price {
    font-size: 20px;
    font-weight: 700;
    color: var(--primary-color);
}

.select-route {
    width: 100%;
}

/* ============================================
   LOADING & ERROR STATES
   ============================================ */
.loading-state,
.error-state {
    text-align: center;
    padding: 60px 20px;
}

.loading-state .spinner {
    width: 60px;
    height: 60px;
    border: 4px solid var(--border-color);
    border-top-color: var(--primary-color);
    border-radius: 50%;
    animation: spin 1s linear infinite;
    margin: 0 auto 20px;
}

@keyframes spin {
    to { transform: rotate(360deg); }
}

.loading-state p,
.error-state p {
    font-size: 16px;
    color: var(--text-secondary);
    margin: 0;
}

.error-state i {
    font-size: 48px;
    color: #dc3545;
    margin-bottom: 15px;
}

/* ============================================
   RESPONSIVE
   ============================================ */
@media (max-width: 768px) {
    .price-calculator {
        padding: 25px;
    }
    
    .calculator-header h2 {
        font-size: 24px;
    }
    
    #map {
        height: 300px;
    }
    
    .distance-info {
        grid-template-columns: 1fr;
    }
    
    .info-item .value {
        font-size: 20px;
    }
    
    .final-price {
        font-size: 24px !important;
    }
    
    .price-actions {
        grid-template-columns: 1fr;
    }
    
    .popular-routes-grid {
        grid-template-columns: 1fr;
    }
}

/* ============================================
   THEME SPECIFIC STYLES
   ============================================ */

/* Dark Theme */
body[data-theme="dark"] .price-calculator {
    background: rgba(30, 30, 30, 0.95);
}

body[data-theme="dark"] .location-input {
    background: #2A2A2A;
    border-color: rgba(255, 165, 0, 0.2);
    color: var(--text-light);
}

body[data-theme="dark"] .location-input:focus {
    border-color: var(--primary-color);
    box-shadow: 0 0 0 4px rgba(255, 165, 0, 0.1);
}

body[data-theme="dark"] #swap-locations {
    background: #2A2A2A;
    border-color: rgba(255, 165, 0, 0.2);
}

body[data-theme="dark"] .price-result-card {
    background: #2A2A2A;
}

body[data-theme="dark"] .route-item,
body[data-theme="dark"] .info-item,
body[data-theme="dark"] .price-breakdown {
    background: #1E1E1E;
}

/* Corporate Theme */
body[data-theme="corporate"] .price-calculator {
    background: rgba(26, 35, 126, 0.95);
}

body[data-theme="corporate"] .location-input {
    background: rgba(255, 255, 255, 0.1);
    border-color: rgba(255, 193, 7, 0.3);
    color: var(--text-light);
}

body[data-theme="corporate"] .location-input:focus {
    border-color: var(--accent-color);
    box-shadow: 0 0 0 4px rgba(255, 193, 7, 0.1);
}

body[data-theme="corporate"] #swap-locations {
    background: rgba(255, 255, 255, 0.1);
    border-color: rgba(255, 193, 7, 0.3);
    color: var(--accent-color);
}

body[data-theme="corporate"] .price-result-card {
    background: rgba(255, 255, 255, 0.05);
}

/* ============================================
   PRINT STYLES
   ============================================ */
@media print {
    .price-calculator {
        box-shadow: none;
    }
    
    #map,
    .price-actions,
    #calculate-price,
    #swap-locations {
        display: none;
    }
    
    .price-result-card {
        page-break-inside: avoid;
    }
}
